  <style>
    html, body { margin: 0; padding: 0; background: #E8E2D6; min-height: 100vh; font-family: 'Be Vietnam Pro', -apple-system, system-ui, sans-serif; }

    .bc-slide-enter { animation: bcSlideIn 320ms cubic-bezier(.2,.7,.2,1) both; }
    @keyframes bcSlideIn { from { opacity: 0.001; transform: translateX(24px); } to { opacity: 1; transform: none; } }
    .bc-pop { animation: bcPop 380ms cubic-bezier(.2,.9,.3,1.3) both; }
    @keyframes bcPop { 0% { transform: scale(.92); opacity: 0.001; } 100% { transform: scale(1); opacity: 1; } }
    .bc-tap { transition: transform 120ms, background 160ms, border-color 160ms; user-select: none; -webkit-tap-highlight-color: transparent; }
    .bc-tap:active { transform: scale(.97); }
    .bc-key:active { background: rgba(26,26,26,0.08) !important; }
